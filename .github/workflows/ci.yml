name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lockfile:
    name: pnpm-lock.yaml is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install --frozen-lockfile
        # Mirrors what Vercel CI does. If a package.json was edited
        # without re-running `pnpm install`, the lockfile drifts and
        # this step fails. Catches that bug before merge instead of
        # after the production deploy errors.
        run: pnpm install --frozen-lockfile

  build-packages:
    name: npm packages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @vdm-nexus/* packages
        # Apps (web / nexus / verify / docs) build on Vercel with their
        # own env vars. Here we only build the publishable packages —
        # pure tsc, no secrets needed. If any package's types break,
        # the PR fails here instead of breaking a downstream consumer.
        run: pnpm --filter "@vdm-nexus/*" build

  python:
    name: python packages — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vdm-nexus (editable, with dev extras)
        # Editable install ensures langchain-vdm-nexus's
        # `vdm-nexus>=0.2.0` dep resolves against this checkout rather
        # than fetching from PyPI (where 0.2.0 won't exist until release).
        run: pip install -e "packages/sdk-python[dev]"

      - name: Install langchain-vdm-nexus (editable, with dev extras)
        run: pip install -e "packages/sdk-python-langchain[dev]"

      - name: pytest — vdm-nexus
        run: python -m pytest -q packages/sdk-python

      - name: pytest — langchain-vdm-nexus
        run: python -m pytest -q packages/sdk-python-langchain
