[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-vdm-nexus"
version = "0.1.0"
description = "LangChain integration for VDM Nexus — signed-inference ChatModel that pays per call via x402 on Solana."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "VDM Nexus" }]
requires-python = ">=3.9"
keywords = [
    "langchain",
    "langchain-integration",
    "langgraph",
    "crewai",
    "solana",
    "ai-agents",
    "x402",
    "signed-inference",
    "vdmnexus",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "vdm-nexus>=0.2.0",
    "langchain-core>=0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.22.0",
]

[project.urls]
Homepage = "https://vdmnexus.com"
Source = "https://github.com/vdmnexus/vdmnexus"
Issues = "https://github.com/vdmnexus/vdmnexus/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/langchain_vdm_nexus"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
