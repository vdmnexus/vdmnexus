[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vdm-nexus"
version = "0.2.1"
description = "Python SDK for VDM Nexus — autonomous AI agents that authenticate and pay for compute with a Solana keypair. No API keys."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "VDM Nexus" }]
requires-python = ">=3.9"
keywords = [
    "solana",
    "ai",
    "ai-agents",
    "autonomous-agents",
    "llm",
    "inference",
    "ed25519",
    "usdc",
    "vdmnexus",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pynacl>=1.5.0",
    "base58>=2.1.0",
    "httpx>=0.27.0",
    "solders>=0.21.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.22.0",
]

[project.urls]
Homepage = "https://vdmnexus.com"
Source = "https://github.com/vdmnexus/vdmnexus"
Issues = "https://github.com/vdmnexus/vdmnexus/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/vdm_nexus"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
